name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version (GitVersion)
        id: gitversion
        uses: gittools/actions/gitversion/execute@v0.4.0
        with:
          useConfigFile: false

      - name: Set version env
        run: |
          echo "VITE_APP_VERSION=${{ steps.gitversion.outputs.SemVer }}" >> $GITHUB_ENV
          echo "VITE_GIT_SHA=${GITHUB_SHA:0:7}" >> $GITHUB_ENV

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test:run

      - name: Build
        run: npm run build
        env:
          VITE_APP_VERSION: ${{ env.VITE_APP_VERSION }}
          VITE_GIT_SHA: ${{ env.VITE_GIT_SHA }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VITE_APP_VERSION=${{ env.VITE_APP_VERSION }}
            VITE_GIT_SHA=${{ env.VITE_GIT_SHA }}
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

    # Optional: add a job to pull and run the image on your server via SSH
